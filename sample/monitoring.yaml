---
apiVersion: monitoring.arthurvardevanyan.com/v1beta1
kind: Cluster
metadata:
  name: cluster-monitoring-config
spec:
  enableUserWorkload: true
  prometheusK8s:
    retention: 10d
    resources:
      requests:
        cpu: 1
        memory: 4Gi
      limits:
        cpu: 3
        memory: 8Gi
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: prometheus
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: prometheus
    volumeClaimTemplate:
      spec:
        storageClassName: longhorn-static
        volumeMode: Filesystem
        resources:
          requests:
            storage: 40Gi
  alertmanagerMain:
    enableUserAlertmanagerConfig: false
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 30m
        memory: 64Mi
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: alertmanager
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: alertmanager
    volumeClaimTemplate:
      spec:
        storageClassName: longhorn-static
        volumeMode: Filesystem
        resources:
          requests:
            storage: 50Mi
  thanosQuerier:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 350m
        memory: 768Mi
---
apiVersion: monitoring.arthurvardevanyan.com/v1beta1
kind: User
metadata:
  name: user-workload-monitoring-config
spec:
  alertmanager:
    enabled: true
    enableAlertmanagerConfig: true
  prometheus:
    retention: 26d
    resources:
      requests:
        cpu: 50m
        memory: 512Mi
      limits:
        cpu: 250m
        memory: 1024Mi
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: prometheus
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: prometheus
    volumeClaimTemplate:
      spec:
        storageClassName: longhorn-static
        volumeMode: Filesystem
        resources:
          requests:
            storage: 5Gi
  thanosRuler:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 50m
        memory: 256Mi
